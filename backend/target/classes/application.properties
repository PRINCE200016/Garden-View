# =============================
# GARDEN VIEW RESORT - BACKEND
# =============================
# Active profile: dev = H2, prod = MySQL, huggingface = H2 file DB
# Set SPRING_PROFILES_ACTIVE=huggingface when deploying to HF
spring.profiles.active=dev

# Mail configuration (shared)
# Note: May fail silently in HF free tier if outgoing SMTP is blocked
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=gardenviewresort2026@gmail.com
spring.mail.password=${MAIL_PASSWORD:your_app_password_here}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server
server.port=${PORT:7860}

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,https://garden-view-resort.vercel.app}

# JPA shared
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=${JWT_SECRET:gardenview_super_secret_key_2026_do_not_share}
jwt.expiration=86400000

